<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Underpin</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #fff;
      color: #000;
      font-family: Arial, Helvetica, sans-serif;
    }

    nav {
      padding: 20px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #eee;
    }

    nav a {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #000;
      text-decoration: none;
    }

    nav .right { color: #aaa; }
    nav .right:hover { color: #000; }

    .search {
      padding: 32px 24px 24px;
      display: flex;
      gap: 8px;
      max-width: 480px;
    }

    input {
      flex: 1;
      border: none;
      border-bottom: 1px solid #000;
      padding: 8px 0;
      font-size: 13px;
      font-family: monospace;
      outline: none;
      background: transparent;
    }

    input::placeholder { color: #ccc; }

    button {
      background: none;
      border: none;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      cursor: pointer;
      padding: 8px 0 8px 16px;
    }

    button:disabled { color: #ccc; cursor: not-allowed; }

    #status {
      display: none;
      padding: 0 24px 16px;
      font-size: 11px;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    #status.error { color: #f00; }

    #profile { display: none; }

    .meta {
      padding: 0 24px 24px;
      display: flex;
      gap: 32px;
      align-items: baseline;
    }

    .meta .wallet {
      font-family: monospace;
      font-size: 11px;
      color: #aaa;
    }

    .meta .counts {
      font-size: 11px;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .tabs {
      padding: 0 24px;
      display: flex;
      gap: 24px;
      border-bottom: 1px solid #eee;
      margin-bottom: 2px;
    }

    .tab {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #ccc;
      cursor: pointer;
      padding: 12px 0;
      border-bottom: 2px solid transparent;
    }

    .tab.active {
      color: #000;
      border-bottom-color: #000;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(calc((100vh - 180px) / 2), 1fr));
      gap: 2px;
      padding: 2px;
    }

    .cell {
      position: relative;
      background: #f5f5f5;
      cursor: pointer;
    }

    .cell img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      display: block;
    }

    .cell .no-img {
      width: 100%;
      aspect-ratio: 1;
      background: #f0f0f0;
    }

    @media (max-width: 600px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
    }

    .cell .label {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(255,255,255,0.92);
      padding: 10px 12px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      display: none;
    }

    .cell:hover .label { display: block; }

    .cell .locked-tag {
      position: absolute;
      top: 8px;
      right: 8px;
      background: #fff;
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 3px 6px;
      color: #f00;
    }

    .notice {
      padding: 16px 24px;
      font-size: 11px;
      color: #aaa;
      border-bottom: 1px solid #eee;
      line-height: 1.6;
    }

    .notice a { color: #000; }

    .empty {
      padding: 64px 24px;
      font-size: 11px;
      color: #ccc;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    footer {
      padding: 24px;
      font-size: 10px;
      color: #ccc;
      text-transform: uppercase;
      letter-spacing: 1px;
      border-top: 1px solid #eee;
      margin-top: 48px;
      display: flex;
      justify-content: space-between;
    }

    footer a { color: #ccc; text-decoration: none; }
    footer a:hover { color: #000; }
  </style>
</head>
<body>

  <nav>
    <a href="underpin.html">Underpin</a>
    <a class="right" href="index.html">Rescue Tool</a>
  </nav>

  <div class="search">
    <input type="text" id="wallet" placeholder="0x..." spellcheck="false" />
    <button id="btn" onclick="load()">Load</button>
  </div>

  <div id="status"></div>

  <div id="profile">
    <div class="meta">
      <span class="wallet" id="walletDisplay"></span>
      <span class="counts" id="counts"></span>
    </div>

    <div class="tabs">
      <div class="tab active" onclick="tab('created')">Created</div>
      <div class="tab" onclick="tab('collected')">Collected</div>
    </div>

    <div id="createdPanel"></div>
    <div id="collectedPanel" style="display:none"></div>
  </div>

  <footer>
    <span>Open source - <a href="https://github.com/tut9492/foundation-rescue" target="_blank">fork it</a></span>
    <a href="https://x.com/Tuteth_" target="_blank">Built by @Tuteth_</a>
  </footer>

  <script>
    async function load() {
      const wallet = document.getElementById('wallet').value.trim();
      const btn = document.getElementById('btn');
      if (!/^0x[a-fA-F0-9]{40}$/.test(wallet)) { status('Invalid address', true); return; }

      btn.disabled = true;
      btn.textContent = '...';
      status('Scanning...');
      document.getElementById('profile').style.display = 'none';

      try {
        const res = await fetch('/api/rescue', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ wallet }),
        });
        const data = await res.json();
        if (!res.ok) { status(data.error || 'Error', true); return; }
        status('');
        render(wallet, data);
      } catch (e) {
        status(e.message, true);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Load';
      }
    }

    function render(wallet, data) {
      document.getElementById('walletDisplay').textContent = wallet.slice(0,6) + '...' + wallet.slice(-4);
      document.getElementById('counts').textContent =
        `${data.createdContracts ?? 0} created · ${data.collectedContracts ?? 0} collected · ${data.nftsFound ?? 0} total`;

      const created   = (data.nftCards || []).filter(n => n.isCreated);
      const collected = (data.nftCards || []).filter(n => !n.isCreated);

      document.getElementById('createdPanel').innerHTML = grid(created, false);
      document.getElementById('collectedPanel').innerHTML = grid(collected, true);
      document.getElementById('profile').style.display = 'block';
      tab('created');
    }

    function grid(nfts, isCollected) {
      if (!nfts.length) return `<div class="empty">None found.</div>`;

      let html = '';

      if (isCollected) {
        html += `<div class="notice">Art you own from other Foundation artists. Their work is at the same risk - <a href="index.html">send them here</a>.</div>`;
      }

      html += `<div class="grid">`;
      for (const n of nfts) {
        const img = n.imageUrl
          ? `<img src="${esc(n.imageUrl)}" alt="${esc(n.name)}" loading="lazy">`
          : `<div class="no-img"></div>`;
        const locked = n.isLocked ? `<span class="locked-tag">Locked</span>` : '';
        html += `<div class="cell" onclick="onSelect('${esc(n.contractAddress)}','${esc(n.tokenId)}',${n.isCreated})">${img}${locked}<div class="label">${esc(n.name)}</div></div>`;
      }
      html += `</div>`;
      return html;
    }

    function tab(name) {
      document.querySelectorAll('.tab').forEach(t =>
        t.classList.toggle('active', t.textContent.toLowerCase() === name)
      );
      document.getElementById('createdPanel').style.display  = name === 'created'   ? 'block' : 'none';
      document.getElementById('collectedPanel').style.display = name === 'collected' ? 'block' : 'none';
    }

    function onSelect(contract, tokenId, isCreated) {
      if (isCreated) alert(`List for sale:\n${contract} #${tokenId}\n\nComing on stream.`);
    }

    function status(msg, err) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = err ? 'error' : '';
      el.style.display = msg ? 'block' : 'none';
    }

    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    document.getElementById('wallet').addEventListener('keydown', e => { if (e.key === 'Enter') load(); });

    const p = new URLSearchParams(location.search).get('wallet');
    if (p) { document.getElementById('wallet').value = p; load(); }
  </script>
</body>
</html>
